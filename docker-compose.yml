services:
  postgres:
    image: postgres:15-alpine
    container_name: veesiri-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: veesiri
      POSTGRES_PASSWORD: veesiri_dev
      POSTGRES_DB: veesiri
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veesiri -d veesiri"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: veesiri-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
